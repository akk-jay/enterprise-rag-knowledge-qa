<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="Microsoft YaHei, PingFang SC, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a56db"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="phaseAGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#e8edf8"/>
    </linearGradient>
    <linearGradient id="phaseBGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#e6f5ea"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <filter id="shadowLg" x="-2%" y="-2%" width="104%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1a56db"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="520" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="500" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#1e3a5f">企业文档知识库 RAG 问答系统 — 技术架构</text>

  <!-- ====== UPLOAD FLOW (Top) ====== -->
  <text x="30" y="70" font-size="12" font-weight="bold" fill="#6b7280">文档导入流程</text>

  <!-- Documents -->
  <rect x="30" y="82" width="140" height="60" rx="8" fill="#fff" stroke="#d0d5dd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="100" y="106" text-anchor="middle" font-size="20">📄 📑 📝</text>
  <text x="100" y="128" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">PDF / DOCX / TXT</text>

  <line x1="170" y1="112" x2="210" y2="112" stroke="#1a56db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Parser -->
  <rect x="215" y="82" width="130" height="60" rx="8" fill="#fff" stroke="#1a56db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="280" y="104" text-anchor="middle" font-size="12" fill="#1a56db" font-weight="bold">📖 文档解析器</text>
  <text x="280" y="124" text-anchor="middle" font-size="9.5" fill="#888">parser.py</text>

  <line x1="345" y1="112" x2="385" y2="112" stroke="#1a56db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Chunker -->
  <rect x="390" y="82" width="130" height="60" rx="8" fill="#fff" stroke="#1a56db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="455" y="104" text-anchor="middle" font-size="12" fill="#1a56db" font-weight="bold">✂️ 智能分片器</text>
  <text x="455" y="124" text-anchor="middle" font-size="9.5" fill="#888">chunker.py</text>

  <line x1="520" y1="112" x2="560" y2="112" stroke="#1a56db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Embedder -->
  <rect x="565" y="82" width="140" height="60" rx="8" fill="#fff" stroke="#1a56db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="635" y="104" text-anchor="middle" font-size="12" fill="#1a56db" font-weight="bold">🔢 向量嵌入</text>
  <text x="635" y="124" text-anchor="middle" font-size="9.5" fill="#888">embedder.py</text>

  <line x1="705" y1="112" x2="745" y2="112" stroke="#1a56db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Vector Store -->
  <rect x="750" y="82" width="150" height="60" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadowLg)"/>
  <text x="825" y="104" text-anchor="middle" font-size="12" fill="#4f46e5" font-weight="bold">🗄️ ChromaDB</text>
  <text x="825" y="124" text-anchor="middle" font-size="9.5" fill="#6b7280">向量库 (持久化)</text>

  <!-- ====== QUERY FLOW (Bottom) ====== -->
  <text x="30" y="180" font-size="12" font-weight="bold" fill="#6b7280">问答流程</text>

  <!-- User -->
  <rect x="30" y="195" width="120" height="50" rx="25" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="90" y="225" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">💬 用户提问</text>

  <line x1="150" y1="220" x2="190" y2="220" stroke="#1a56db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Rewriter -->
  <rect x="195" y="195" width="120" height="50" rx="8" fill="#fff" stroke="#1a56db" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="255" y="216" text-anchor="middle" font-size="11.5" fill="#1a56db" font-weight="bold">🔄 查询改写</text>
  <text x="255" y="234" text-anchor="middle" font-size="9" fill="#888">rewriter.py</text>

  <line x1="315" y1="220" x2="355" y2="220" stroke="#1a56db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Retriever (big box) -->
  <rect x="360" y="185" width="220" height="70" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadowLg)"/>
  <text x="470" y="208" text-anchor="middle" font-size="12" fill="#4f46e5" font-weight="bold">🔍 混合检索</text>
  <text x="470" y="226" text-anchor="middle" font-size="9.5" fill="#6b7280">retriever.py</text>
  <!-- sub-boxes inside retriever -->
  <rect x="370" y="234" width="95" height="16" rx="4" fill="#dbeafe"/>
  <text x="417" y="246" text-anchor="middle" font-size="8" fill="#1e40af">向量检索 (70%)</text>
  <rect x="475" y="234" width="95" height="16" rx="4" fill="#dbeafe"/>
  <text x="522" y="246" text-anchor="middle" font-size="8" fill="#1e40af">BM25 关键词 (30%)</text>

  <line x1="580" y1="220" x2="620" y2="220" stroke="#1a56db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Condition -->
  <rect x="625" y="195" width="100" height="50" rx="8" fill="#fff" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="675" y="216" text-anchor="middle" font-size="10.5" fill="#d97706" font-weight="bold">⚡ 判断</text>
  <text x="675" y="234" text-anchor="middle" font-size="9" fill="#888">score ≥ 0.7?</text>

  <!-- LLM path -->
  <line x1="725" y1="210" x2="755" y2="195" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="738" y="200" text-anchor="middle" font-size="8" fill="#22c55e">YES</text>

  <!-- Generator -->
  <rect x="760" y="170" width="130" height="50" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="825" y="191" text-anchor="middle" font-size="12" fill="#166534" font-weight="bold">🤖 LLM 生成</text>
  <text x="825" y="209" text-anchor="middle" font-size="9.5" fill="#6b7280">qwen3-max, t=0</text>

  <line x1="890" y1="195" x2="920" y2="195" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrowBlue)"/>

  <!-- Answer -->
  <rect x="925" y="172" width="60" height="46" rx="23" fill="#22c55e" filter="url(#shadow)"/>
  <text x="955" y="200" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">✅ 答案</text>

  <!-- Fallback path -->
  <line x1="675" y1="245" x2="675" y2="278" stroke="#ef4444" stroke-width="1.5"/>
  <line x1="675" y1="278" x2="760" y2="278" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="700" y="272" font-size="8" fill="#ef4444">NO (兜底)</text>

  <rect x="765" y="260" width="120" height="36" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="825" y="276" text-anchor="middle" font-size="10.5" fill="#dc2626" font-weight="bold">⚠️ 兜底回复</text>
  <text x="825" y="290" text-anchor="middle" font-size="8" fill="#888">"未找到相关信息"</text>

  <!-- ====== Bottom: Key params card ====== -->
  <rect x="30" y="330" width="940" height="175" rx="10" fill="#fff" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow)"/>

  <text x="50" y="358" font-size="13" font-weight="bold" fill="#1e3a5f">⚙️ 关键参数</text>

  <!-- Param cards row 1 -->
  <rect x="40" y="372" width="108" height="50" rx="6" fill="#f0f4ff"/>
  <text x="94" y="393" text-anchor="middle" font-size="9" fill="#6b7280">chunk_size</text>
  <text x="94" y="413" text-anchor="middle" font-size="13" fill="#1a56db" font-weight="bold">500</text>

  <rect x="156" y="372" width="108" height="50" rx="6" fill="#f0f4ff"/>
  <text x="210" y="393" text-anchor="middle" font-size="9" fill="#6b7280">chunk_overlap</text>
  <text x="210" y="413" text-anchor="middle" font-size="13" fill="#1a56db" font-weight="bold">100</text>

  <rect x="272" y="372" width="108" height="50" rx="6" fill="#f0f4ff"/>
  <text x="326" y="393" text-anchor="middle" font-size="9" fill="#6b7280">Top-K</text>
  <text x="326" y="413" text-anchor="middle" font-size="13" fill="#1a56db" font-weight="bold">3</text>

  <rect x="388" y="372" width="108" height="50" rx="6" fill="#f0f4ff"/>
  <text x="442" y="393" text-anchor="middle" font-size="9" fill="#6b7280">相似度阈值</text>
  <text x="442" y="413" text-anchor="middle" font-size="13" fill="#1a56db" font-weight="bold">0.7</text>

  <rect x="504" y="372" width="108" height="50" rx="6" fill="#f0f4ff"/>
  <text x="558" y="393" text-anchor="middle" font-size="9" fill="#6b7280">向量权重</text>
  <text x="558" y="413" text-anchor="middle" font-size="13" fill="#1a56db" font-weight="bold">0.7</text>

  <rect x="620" y="372" width="108" height="50" rx="6" fill="#f0f4ff"/>
  <text x="674" y="393" text-anchor="middle" font-size="9" fill="#6b7280">BM25 权重</text>
  <text x="674" y="413" text-anchor="middle" font-size="13" fill="#1a56db" font-weight="bold">0.3</text>

  <rect x="736" y="372" width="108" height="50" rx="6" fill="#fef2f2"/>
  <text x="790" y="393" text-anchor="middle" font-size="9" fill="#6b7280">Temperature</text>
  <text x="790" y="413" text-anchor="middle" font-size="13" fill="#dc2626" font-weight="bold">0</text>

  <rect x="852" y="372" width="108" height="50" rx="6" fill="#f0f4ff"/>
  <text x="906" y="393" text-anchor="middle" font-size="9" fill="#6b7280">Max Tokens</text>
  <text x="906" y="413" text-anchor="middle" font-size="13" fill="#1a56db" font-weight="bold">1024</text>

  <!-- Param cards row 2 - Prompt defense -->
  <text x="50" y="455" font-size="10.5" fill="#6b7280">🛡️ Prompt 四道防线：</text>

  <rect x="180" y="442" width="180" height="28" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="270" y="460" text-anchor="middle" font-size="10" fill="#1e40af">① 角色限定 — 知识库问答助手</text>

  <rect x="370" y="442" width="185" height="28" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="462" y="460" text-anchor="middle" font-size="10" fill="#1e40af">② 范围限定 — 仅用文档内容</text>

  <rect x="565" y="442" width="185" height="28" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="657" y="460" text-anchor="middle" font-size="10" fill="#1e40af">③ 相似度过滤 — 低分丢弃</text>

  <rect x="760" y="442" width="200" height="28" rx="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="860" y="460" text-anchor="middle" font-size="10" fill="#1e40af">④ 诚实约定 — 不知即说不知</text>

  <!-- Tech stack footer -->
  <text x="50" y="498" font-size="9.5" fill="#9ca3af">技术栈：Python 3.11 · FastAPI · ChromaDB · 通义千问 qwen3-max + text-embedding-v3 · BM25 (rank-bm25 + jieba) · Dify</text>
</svg>
